# Kustomization = the manifest list for this service. Argo points at the k8s/
# folder; kustomize stitches these together. Per-environment overlays come later
# (ADR convention: overlays/<env>) — for the skeleton this base is enough.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: splitwise
resources:
  - namespace.yaml
  # Identity's own Postgres (db-per-service) + its migration Job (Argo PreSync).
  - postgres.yaml
  - migrate-job.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # Local dev only: catch-all mailbox so the password-reset email lands
  # somewhere we can read. Prod overlay drops this (real SMTP relay).
  - mailpit.yaml
# NOTE: secret.example.yaml is intentionally NOT listed — it is a template only.
# The real identity-secrets Secret is created out of band (kind) or sealed (prod).

# IMAGE TAG CONVENTION (ADR-0013): CI bumps these to the immutable git SHA so
# Argo deploys the exact build, not a moving :latest. Both images move together.
images:
  - name: ghcr.io/kopparamphani/identity
    newTag: c64d714a3e2876aff97c302140b0ef05810de76c
  - name: ghcr.io/kopparamphani/identity-migrate
    newTag: c64d714a3e2876aff97c302140b0ef05810de76c
