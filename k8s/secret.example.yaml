# SECRET TEMPLATE — DO NOT COMMIT REAL VALUES HERE.
#
# WHY THIS IS A TEMPLATE (ADR-0018, staged):
#   Prod path = Sealed Secrets (encrypted, safe to commit). For the LOCAL kind
#   cluster the Sealed Secrets controller could not be installed (Zscaler TLS
#   proxy blocks the controller image pull with x509, and the `kubeseal` CLI is
#   not available to produce a SealedSecret). So locally we create the REAL
#   Secret OUT OF BAND with kubectl and commit only this placeholder.
#   Like: we ship the empty envelope; the real letter is handed over by hand.
#
# This file is NOT in kustomization.yaml — it is documentation only.
#
# Create the real Secret out of band (values are examples, change JWT_SECRET):
#   kubectl -n splitwise create secret generic identity-secrets \
#     --from-literal=DATABASE_URL='postgres://identity:identity-dev-pw@identity-db:5432/identity' \
#     --from-literal=JWT_SECRET='<a-long-random-string>'
#
# The Postgres StatefulSet reads the SAME DATABASE_URL-derived creds from this
# Secret, so app + db + migration Job all agree on one source of truth.
apiVersion: v1
kind: Secret
metadata:
  name: identity-secrets
  namespace: splitwise
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: splitwise
type: Opaque
stringData:
  # postgres-js URL the NestJS app + drizzle-kit read. Host = the db Service.
  DATABASE_URL: "postgres://identity:REPLACE_ME@identity-db:5432/identity"
  # Signs the access-token JWT. MUST be a long random value in any real use.
  JWT_SECRET: "REPLACE_ME_LONG_RANDOM"
  # Pieces below let the Postgres container build its own user/db without
  # re-parsing the URL. Keep these in sync with DATABASE_URL above.
  POSTGRES_USER: "identity"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "identity"
  # Google sign-in (1b). Read at boot (getOrThrow) so it MUST be present or the
  # pod won't start. Local = a dummy id; PROD real client id is a deploy secret.
  GOOGLE_CLIENT_ID: "local-dev.apps.googleusercontent.com"
  # Password-reset email (1c). Local points at the in-cluster Mailpit catch-all.
  # PROD = real SMTP host/port/from via deploy-time secret.
  SMTP_HOST: "mailpit"
  SMTP_PORT: "1025"
  SMTP_FROM: "no-reply@splitwise.local"
  # Base URL baked into the reset link. Must match where the user opens the app.
  # Local = the identity port-forward; PROD = the real web origin.
  APP_BASE_URL: "http://localhost:8085"
