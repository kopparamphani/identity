# Deployment = "keep N copies of this container running". K8s restarts crashes,
# rolls out new versions, and points the probes at our health endpoints.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: splitwise
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: splitwise
spec:
  # One copy for the walking skeleton. Bump later when we need HA.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
        app.kubernetes.io/part-of: splitwise
    spec:
      # Pod-level security: never run as root. Belt-and-suspenders with the
      # Dockerfile's USER node (UID 1000).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Wait for Postgres before the app boots. The Argo PreSync migrate Job
      # also runs first, but this covers plain `kubectl apply -k` (no hooks) and
      # pod restarts. Like: don't open the shop till the lights are on.
      initContainers:
        - name: wait-for-db
          image: postgres:16.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h identity-db -p 5432 -U "$PGUSER"; do
                echo "waiting for identity-db..."; sleep 2
              done
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: POSTGRES_USER
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: identity
          # IMAGE TAG CONVENTION (ADR-0013):
          #   - CI pushes BOTH the immutable git SHA tag and a moving `latest`.
          #   - Argo must deploy the SHA, not `latest`, for reproducible state.
          #   - This `:latest` is a PLACEHOLDER. The real SHA tag is bumped HERE
          #     by CI (or by hand) per our convention. Like: pin the exact build.
          image: ghcr.io/kopparamphani/identity:c64d714a3e2876aff97c302140b0ef05810de76c
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            # App reads PORT from env; keep it explicit so probes/Service agree.
            - name: PORT
              value: "3000"
            # production = Secure cookie flag on (auth.controller.ts).
            - name: NODE_ENV
              value: "production"
            # Secrets (ADR-0018). DATABASE_URL -> postgres-js; JWT_SECRET -> tokens.
            # Pulled from the identity-secrets Secret (created out of band locally,
            # Sealed Secret in prod). Fail-loud: db.module getOrThrow if missing.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: JWT_SECRET
            # Google sign-in (1b). App reads this at boot with getOrThrow
            # (google-verifier.service.ts) -> MISSING = pod won't start.
            # Dummy locally; real client id is a deploy secret.
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: GOOGLE_CLIENT_ID
            # Password-reset email (1c). SMTP_HOST is getOrThrow in the send
            # path (email.service.ts); the rest shape the message + link.
            # Local = Mailpit catch-all inbox. Prod = real SMTP via secret.
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: SMTP_PORT
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: SMTP_FROM
            # Base URL baked into the reset link (auth.service.ts getOrThrow).
            # Must match where the user opens the app. Local = the port-forward.
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: APP_BASE_URL
          # Liveness = "is it alive?". Fail -> K8s restarts the pod.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness = "ready for traffic?". Fail -> pulled out of the Service.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Resource asks. FLAGGED DEFAULT: conventional small values for a
          # Node skeleton. Tune once we have real load numbers.
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # Container hardening: no privilege escalation, read-only root FS.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
