# CI for the identity service (ADR-0014).
# Caveman flow: install -> build -> test -> (only on main) build images, tag with
# git SHA + latest, push to GHCR -> bump the SHA into k8s/ so Argo rolls it.
name: ci

# Run on every push to main and on every PR. PRs build/test but do NOT push.
# paths-ignore: a commit that ONLY touches k8s/ is the bot's own SHA-bump — skip
# it so we don't loop (build -> bump -> build -> ...). Belt: the bump commit also
# carries [skip ci]. Like: the mailman ignores letters he just delivered himself.
on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"
  pull_request:

# One run per ref; cancel older runs so rapid pushes don't race two image pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read+write the repo (write = push the SHA-bump commit), and
# write packages (GHCR) when we push images.
permissions:
  contents: write
  packages: write

# Where the images live (ADR-0013). Lowercase required by GHCR.
env:
  IMAGE: ghcr.io/kopparamphani/identity
  MIGRATE_IMAGE: ghcr.io/kopparamphani/identity-migrate

jobs:
  # ---- Build + test the Node app ----
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # npm ci = clean, reproducible install from the lockfile.
      - name: Install
        run: npm ci

      # Compile TS -> JS. Fails the build if the code doesn't compile.
      - name: Build
        run: npm run build

      # e2e/jest tests. Skeleton: hits the health endpoints.
      - name: Test
        run: npm test

  # ---- Build the images + push to GHCR, then bump the SHA into k8s/. ----
  image:
    needs: build-test
    runs-on: ubuntu-latest
    # Guard: never push images from PRs (fork PRs lack a write token anyway).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Need write creds persisted so we can push the SHA-bump commit back.
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Buildx gives us a modern builder with layer caching.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the built-in token. No secrets to manage.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # App image (runtime target). Tag twice: immutable SHA + moving latest.
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Migrate image (migrate target): carries drizzle-kit + SQL for the Job.
      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE }}:${{ github.sha }}
            ${{ env.MIGRATE_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- CI -> manifest handoff (Iteration-0 follow-up #1, ADR-0013) ----
      # Write the immutable SHA into kustomization's `images: newTag` so Argo (on
      # main) deploys THIS exact build instead of a frozen :latest. Commit it
      # back to main with [skip ci]; paths-ignore: k8s/** also stops a re-trigger.
      # Like: update the mailbox address so new mail reaches the new house.
      - name: Bump image SHA in k8s manifests
        run: |
          SHA="${{ github.sha }}"
          # kustomize edit would need the CLI; sed is enough and dependency-free.
          # Replace the newTag under BOTH image entries with the new SHA.
          sed -i -E "s|(image: ghcr.io/kopparamphani/identity:)[^[:space:]]+|\1${SHA}|" k8s/deployment.yaml || true
          # Update kustomization newTag lines (both images share the same SHA).
          sed -i -E "/name: ghcr.io\/kopparamphani\/identity$/{n;s|(newTag: ).*|\1${SHA}|}" k8s/kustomization.yaml
          sed -i -E "/name: ghcr.io\/kopparamphani\/identity-migrate$/{n;s|(newTag: ).*|\1${SHA}|}" k8s/kustomization.yaml
          # Also pin the migrate Job image (it's a raw manifest, not kustomize-managed tag swap target by name only).
          sed -i -E "s|(image: ghcr.io/kopparamphani/identity-migrate:)[^[:space:]]+|\1${SHA}|" k8s/migrate-job.yaml || true

      - name: Commit the SHA bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/; then
            echo "No manifest change to commit."
            exit 0
          fi
          git add k8s/kustomization.yaml k8s/deployment.yaml k8s/migrate-job.yaml
          git commit -m "ci: pin identity images to ${{ github.sha }} [skip ci]"
          git push origin HEAD:main
